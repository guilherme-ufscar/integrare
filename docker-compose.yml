services:
  db:
    image: mysql:8.0
    container_name: integrare_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-integrare}
      MYSQL_USER: ${MYSQL_USER:-integrare}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-integrarepassword}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: builder
    container_name: integrare_migrate
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-integrare}:${MYSQL_PASSWORD:-integrarepassword}@db:3306/${MYSQL_DATABASE:-integrare}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  app:
    build:
      context: .
      target: runner
    container_name: integrare_app
    restart: unless-stopped
    ports:
      - "8301:8301"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-integrare}:${MYSQL_PASSWORD:-integrarepassword}@db:3306/${MYSQL_DATABASE:-integrare}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:8301}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:8301}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  db_data:
